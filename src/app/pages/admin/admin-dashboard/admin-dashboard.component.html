<div class="dashboard-container">

    <!-- HEADER -->
    <div>
        <h1 class="text-2xl font-semibold text-gray-800">
            Good Morning, Admin 👋
        </h1>
        <p class="text-sm text-gray-500">
            System overview across all modules
        </p>
    </div>



<!-- STATS -->
<div class="grid grid-cols-4 lg:grid-cols-4 md:grid-cols-2 sm:grid-cols-1 gap-4 mb-6">
    <!-- Total Employees -->
    <div class="stat-card">
        <div class="icon blue"><i class="fas fa-users"></i></div>
        <div class="text">
            <p>Total Employees</p>
            <h2>842</h2>
        </div>
    </div>

    <!-- Locations -->
    <div class="stat-card">
        <div class="icon indigo"><i class="fas fa-map-marker-alt"></i></div>
        <div class="text">
            <p>Locations</p>
            <h2>4</h2>
        </div>
    </div>

    <!-- Departments -->
    <div class="stat-card">
        <div class="icon orange"><i class="fas fa-building"></i></div>
        <div class="text">
            <p>Departments</p>
            <h2>18</h2>
        </div>
    </div>

    <!-- Open Vacancies -->
    <div class="stat-card">
        <div class="icon red"><i class="fas fa-briefcase"></i></div>
        <div class="text">
            <p>Open Vacancies</p>
            <h2 class="text-red-500">24</h2>
        </div>
    </div>

    <!-- Applications -->
    <div class="stat-card">
        <div class="icon purple"><i class="fas fa-envelope"></i></div>
        <div class="text">
            <p>Applications</p>
            <h2>{{applicationsCount}}</h2>
        </div>
    </div>

    <!-- Offers -->
    <div class="stat-card">
        <div class="icon green"><i class="fas fa-file-signature"></i></div>
        <div class="text">
            <p>Offers Released</p>
            <h2>{{offersCount}}</h2>
        </div>
    </div>

    <!-- Joined -->
    <div class="stat-card">
        <div class="icon success"><i class="fas fa-user-check"></i></div>
        <div class="text">
            <p>Candidates Joined</p>
            <h2>{{joinedCount}}</h2>
        </div>
    </div>

</div>
    <!-- CHARTS -->
    <div class="grid grid-cols-2 gap-4">

        <div class="bg-white p-4 rounded-xl border">
            <h3 class="font-semibold mb-2">Jobs Opened</h3>
            <canvas id="jobsChart"></canvas>
        </div>

        <div class="bg-white p-4 rounded-xl border">
            <h3 class="font-semibold mb-2">Employees by Department</h3>
            <canvas id="hiredChart"></canvas>
        </div>

    </div>
